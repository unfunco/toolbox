<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Action Pins</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: ui-monospace, monospace; padding: 2rem; max-width: 48rem; margin: 0 auto; background: #0d1117; color: #e6edf3; }
		h1 { font-size: 1.25rem; margin-bottom: 1rem; }
		#search { width: 100%; padding: 0.5rem 0.75rem; font: inherit; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 0.375rem; outline: none; }
		#search:focus { border-color: #58a6ff; }
		#results { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
		.pin { font: inherit; text-align: left; padding: 0.5rem 0.75rem; background: #161b22; color: #7ee787; border: 1px solid #30363d; border-radius: 0.375rem; cursor: pointer; word-break: break-all; }
		.pin:hover { border-color: #58a6ff; }
		.pin.copied { border-color: #7ee787; }
	</style>
</head>
<body>
	<h1>📌 Action Pins</h1>
	<input id="search" type="text" placeholder="Search actions…" autofocus>
	<div id="results"></div>
	<script src="main.js"></script>
</body>
</html>
