name: PR / Pins Data

on:
  pull_request:

jobs:
  verify-pins-data:
    name: Verify Pins Data
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Validate pins data updates
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        python3 .github/scripts/validate_pins_pr.py \
          --actions-file actions.txt \
          --pins-file pins.json \
          --base-ref "${{ github.event.pull_request.base.sha }}"
