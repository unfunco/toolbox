name: PR / Pins Source

on:
  pull_request:

jobs:
  verify:
    name: Verify Pins Source
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Validate actions.csv
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        python3 .github/scripts/validate_actions_source.py \
          --actions-file actions.csv \
          --base-ref "${{ github.event.pull_request.base.sha }}"
