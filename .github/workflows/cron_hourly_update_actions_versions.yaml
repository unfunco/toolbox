name: Cron / Hourly Update Actions Versions

on:
  schedule:
  - cron: "26 * * * *"
  workflow_dispatch:
    inputs:
      shard:
        description: Optional shard to process instead of the current UTC hour.
        required: false
        type: string

concurrency:
  cancel-in-progress: false
  group: hourly-action-version-updates

jobs:
  update-actions-versions:
    name: Update Actions Versions
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Select shard
      id: shard
      env:
        INPUT_SHARD: ${{ github.event.inputs.shard }}
      run: |
        set -euo pipefail

        shard="${INPUT_SHARD:-}"
        if [[ -z "$shard" ]]; then
          shard="$(date -u +%H)"
        fi

        if ! [[ "$shard" =~ ^([0-9]|0[0-9]|1[0-9]|2[0-3])$ ]]; then
          >&2 echo "Shard must be an integer between 0 and 23."
          exit 1
        fi

        shard="$((10#$shard))"

        echo "Selected shard $shard"
        echo "shard=$shard" >> "$GITHUB_OUTPUT"
    - name: Refresh selected shard in state.json
      id: update-state
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        python3 .github/scripts/update_actions_state.py \
          --actions-file actions.txt \
          --state-file state.json \
          --shard "${{ steps.shard.outputs.shard }}"
      timeout-minutes: 5
    - name: Verify GitHub App configuration
      if: steps.update-state.outputs.changed == 'true'
      env:
        MERGE_SIMPSON_APP_ID: ${{ vars.MERGE_SIMPSON_APP_ID }}
        MERGE_SIMPSON_APP_PRIVATE_KEY: ${{ secrets.MERGE_SIMPSON_APP_PRIVATE_KEY }}
      run: |
        set -euo pipefail

        : "${MERGE_SIMPSON_APP_ID:?Set repository variable MERGE_SIMPSON_APP_ID.}"
        : "${MERGE_SIMPSON_APP_PRIVATE_KEY:?Set repository secret MERGE_SIMPSON_APP_PRIVATE_KEY.}"
    - name: Create GitHub App token
      id: app-token
      if: steps.update-state.outputs.changed == 'true'
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
      with:
        app-id: ${{ vars.MERGE_SIMPSON_APP_ID }}
        private-key: ${{ secrets.MERGE_SIMPSON_APP_PRIVATE_KEY }}
        permission-contents: write
        permission-pull-requests: write
    - name: Look up GitHub App bot user
      id: app-user
      if: steps.update-state.outputs.changed == 'true'
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        set -euo pipefail

        user_id="$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)"
        echo "user-id=$user_id" >> "$GITHUB_OUTPUT"
    - name: Create pull request
      id: create-pull-request
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      if: steps.update-state.outputs.changed == 'true'
      run: |
        set -euo pipefail

        gh --version

        git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
        git config user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

        branch="update-actions-shard-${{ steps.shard.outputs.shard }}-$(date -u +%Y%m%d%H%M%S)"

        git checkout -b "$branch"
        git add state.json

        staged_files="$(git diff --cached --name-only)"
        if [[ "$staged_files" != "state.json" ]]; then
          >&2 echo "Expected only state.json to be staged, got:"
          >&2 echo "$staged_files"
          exit 1
        fi

        git commit -m "chore: Update GitHub Actions for shard ${{ steps.shard.outputs.shard }}"
        git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$branch"

        pr_url="$(gh pr create \
          --title "chore: Update versions for shard ${{ steps.shard.outputs.shard }}" \
          --body "This updates the versions of GitHub Actions in shard ${{ steps.shard.outputs.shard }} to the latest versions published on the GitHub Marketplace." \
          --label "automata 🤖" \
          --label "chore 🧹" \
          --head "$branch" \
          --base main)"

        echo "pr-url=$pr_url" >> "$GITHUB_OUTPUT"
    - name: Wait for pull request checks
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      if: steps.update-state.outputs.changed == 'true'
      run: |
        set -euo pipefail

        gh pr checks "${{ steps.create-pull-request.outputs.pr-url }}" --watch --fail-fast
    - name: Merge pull request
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      if: steps.update-state.outputs.changed == 'true'
      run: |
        set -euo pipefail

        gh pr merge --squash --delete-branch "${{ steps.create-pull-request.outputs.pr-url }}"
